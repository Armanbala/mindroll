<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#040a04">
<title>Sequence Memory — MindRoll</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040a04;--bg-r:#081408;
  --fg:#b8ffb8;--fg-b:#d8ffd8;--fg-d:#7fbf7f;--fg-f:#3a7a3a;
  --fg-bg:#1e3d1e;--fg-bg2:#2f5f2f;
  --accent:#6fe06f;--red:#ff6a5a;
  --glow:0 0 4px rgba(111,224,111,0.35);
  --font:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
html,body{background:var(--bg);color:var(--fg);font-family:var(--font);font-size:14px;line-height:1.55;min-height:100dvh;-webkit-tap-highlight-color:transparent}
body{position:relative;padding:0 20px calc(80px + env(safe-area-inset-bottom,0px));text-shadow:var(--glow);display:flex;flex-direction:column;align-items:center}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0 1px,transparent 1px 3px);mix-blend-mode:multiply}

.topbar{width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;gap:16px;font-size:11px;letter-spacing:0.08em;color:var(--fg-d);padding:14px 0 10px;border-bottom:1px solid var(--fg-bg);margin-bottom:16px;position:relative;z-index:2}
.topbar .tb-brand{color:var(--accent);font-weight:700;letter-spacing:0.15em}
.topbar a{color:var(--fg-d);text-decoration:none}
.topbar a:hover{color:var(--fg-b)}

.page-head{width:100%;max-width:900px;border-top:1px solid var(--fg-bg);border-bottom:1px solid var(--fg-bg);padding:8px 0;margin-bottom:20px;position:relative;z-index:2}
.page-head h1{font-size:13px;font-weight:700;color:var(--fg-b);letter-spacing:0.12em;text-transform:uppercase}
.page-head h1::before{content:"» ";color:var(--accent)}

.wrap{width:100%;max-width:900px;position:relative;z-index:2}

.display-box{background:var(--bg-r);border:1px solid var(--fg-bg);min-height:420px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;margin-bottom:20px;position:relative;overflow:hidden}
.display-box::before,.display-box::after{content:"";position:absolute;width:14px;height:14px;border:1px solid var(--accent);opacity:0.8}
.display-box::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.display-box::after{bottom:-1px;right:-1px;border-left:none;border-top:none}

/* Simon grid — 3x3 */
.simon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:300px}
.simon-cell{aspect-ratio:1;cursor:pointer;transition:opacity 0.12s,transform 0.1s;opacity:0.3;border:1px solid transparent;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.simon-cell:active{transform:scale(0.92)}
.simon-cell.flash{opacity:1!important;transform:scale(1.05);border-color:rgba(255,255,255,0.25);box-shadow:0 0 20px rgba(255,255,255,0.08)}
.simon-cell.locked{pointer-events:none}
/* cell colors */
.simon-cell:nth-child(1){background:#c94040}
.simon-cell:nth-child(2){background:#4090c9}
.simon-cell:nth-child(3){background:#c9a440}
.simon-cell:nth-child(4){background:#40c970}
.simon-cell:nth-child(5){background:#a040c9}
.simon-cell:nth-child(6){background:#c97040}
.simon-cell:nth-child(7){background:#40c0b8}
.simon-cell:nth-child(8){background:#c94070}
.simon-cell:nth-child(9){background:#6070c9}

.level-display{font-size:clamp(32px,6vw,48px);font-weight:700;color:var(--accent);text-shadow:0 0 12px rgba(111,224,111,0.5)}
.state-message{font-size:16px;color:var(--fg-d);text-align:center;margin-top:8px}
.sub-message{font-size:13px;color:var(--fg-f);text-align:center;margin-top:4px}

/* Progress dots */
.progress-dots{display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap;max-width:320px}
.pdot{width:10px;height:10px;background:var(--fg-bg);transition:background 0.15s}
.pdot.done{background:var(--accent)}
.pdot.current{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.pdot.wrong{background:var(--red)}

.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
button{font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:transparent;color:var(--fg-b);border:1px solid var(--fg-d);padding:9px 20px;cursor:pointer;border-radius:0;text-shadow:var(--glow);transition:background 0.08s,border-color 0.08s,color 0.08s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button:hover{background:rgba(111,224,111,0.1);border-color:var(--accent);color:var(--accent)}
button:active{background:rgba(111,224,111,0.2)}
button.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);text-shadow:none}
button.primary:hover{background:#8fff8f;color:var(--bg)}
button.secondary{border-color:var(--fg-bg);color:var(--fg-d)}

.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.stat-card{flex:1 1 90px;background:var(--bg-r);border:1px solid var(--fg-bg);padding:10px 14px;min-width:80px}
.stat-label{font-size:10px;color:var(--fg-f);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:4px}
.stat-label::before{content:"› ";color:var(--fg-bg2)}
.stat-value{font-size:22px;font-weight:700;color:var(--fg-b)}

.toast{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:var(--bg);font-weight:700;letter-spacing:0.08em;padding:10px 22px;border:1px solid var(--accent);opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;z-index:100;text-shadow:none;font-family:var(--font);font-size:13px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@media(max-width:480px){.display-box{min-height:340px}.simon-grid{max-width:260px;gap:8px}}
</style>
</head>
<body>

<div class="topbar">
  <span class="tb-brand">MINDROLL_BBS</span>
  <a href="index.html">← BACK TO LAB</a>
</div>

<div class="page-head"><h1>Sequence Memory</h1></div>

<div class="wrap">

  <div class="display-box" id="displayBox">
    <div class="level-display" id="levelDisplay" style="display:none"></div>
    <span class="state-message" id="stateMsg">Press start to begin</span>
    <span class="sub-message" id="subMsg">Watch the sequence, then repeat it</span>
    <div class="simon-grid" id="simonGrid" style="display:none"></div>
    <div class="progress-dots" id="progressDots" style="display:none"></div>
  </div>

  <div class="btn-row">
    <button class="primary" id="startBtn" onclick="startGame()">Start</button>
    <button class="secondary" id="retryBtn" onclick="startGame()" style="display:none">Try again</button>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-card"><div class="stat-label">Level</div><div class="stat-value" id="statLevel">1</div></div>
    <div class="stat-card"><div class="stat-label">Best</div><div class="stat-value" id="statBest">0</div></div>
    <div class="stat-card"><div class="stat-label">Rounds</div><div class="stat-value" id="statRounds">0</div></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
let sequence=[],playerIndex=0,level=1,state='idle';
let stats={best:parseInt(localStorage.getItem('mindroll_seq_best')||'0',10),rounds:0};
function $(id){return document.getElementById(id)}

function buildGrid(){
  const grid=$('simonGrid');grid.innerHTML='';
  for(let i=0;i<9;i++){
    const cell=document.createElement('div');
    cell.className='simon-cell locked';cell.dataset.index=i;
    cell.addEventListener('click',()=>cellClicked(i));
    cell.addEventListener('touchend',e=>{e.preventDefault();cellClicked(i);});
    grid.appendChild(cell);
  }
  grid.style.display='grid';
}

function startGame(){
  level=1;sequence=[];stats.rounds=0;
  $('startBtn').style.display='none';$('retryBtn').style.display='none';
  $('statsBar').style.display='flex';$('stateMsg').style.display='none';$('subMsg').style.display='none';
  updateStats();buildGrid();nextLevel();
}

function nextLevel(){
  sequence.push(Math.floor(Math.random()*9));
  playerIndex=0;state='showing';
  $('levelDisplay').style.display='block';$('levelDisplay').textContent=level;
  $('levelDisplay').style.animation='none';$('levelDisplay').offsetHeight;$('levelDisplay').style.animation='pulse 0.4s ease';
  lockCells(true);renderDots();$('progressDots').style.display='flex';
  setTimeout(()=>playSequence(),600);
}

async function playSequence(){
  $('levelDisplay').style.display='none';
  const delay=Math.max(200,500-level*15);
  const gap=Math.max(100,250-level*10);
  for(let i=0;i<sequence.length;i++){
    await flashCell(sequence[i],delay);
    if(i<sequence.length-1)await sleep(gap);
  }
  state='answering';lockCells(false);
}

function flashCell(index,duration){
  return new Promise(resolve=>{
    const cell=$('simonGrid').children[index];
    cell.classList.add('flash');
    setTimeout(()=>{cell.classList.remove('flash');setTimeout(resolve,50);},duration);
  });
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function lockCells(locked){const cells=$('simonGrid').children;for(let c of cells){if(locked)c.classList.add('locked');else c.classList.remove('locked');}}

function cellClicked(index){
  if(state!=='answering')return;
  const cell=$('simonGrid').children[index];
  cell.classList.add('flash');setTimeout(()=>cell.classList.remove('flash'),200);
  if(index===sequence[playerIndex]){
    markDot(playerIndex,'done');playerIndex++;
    if(playerIndex>=sequence.length){
      state='waiting';lockCells(true);stats.rounds++;level++;
      if(level-1>stats.best){stats.best=level-1;localStorage.setItem('mindroll_seq_best',stats.best.toString());}
      updateStats();showToast(level<=5?'Nice!':level<=10?'Great!':'Incredible!');
      setTimeout(()=>nextLevel(),800);
    } else {markDot(playerIndex,'current');}
  } else {
    markDot(playerIndex,'wrong');state='gameover';lockCells(true);stats.rounds++;
    if(level>stats.best){stats.best=level;localStorage.setItem('mindroll_seq_best',stats.best.toString());}
    updateStats();
    setTimeout(()=>{const correct=$('simonGrid').children[sequence[playerIndex]];correct.classList.add('flash');setTimeout(()=>correct.classList.remove('flash'),600);},300);
    setTimeout(()=>{
      $('simonGrid').style.display='none';$('progressDots').style.display='none';
      $('levelDisplay').style.display='block';$('levelDisplay').textContent='Level '+level;
      $('stateMsg').style.display='block';$('stateMsg').textContent='Sequence length: '+sequence.length;
      $('subMsg').style.display='block';$('subMsg').textContent='You remembered '+playerIndex+' of '+sequence.length+' steps';
      $('retryBtn').style.display='inline-block';
    },1200);
  }
}

function renderDots(){
  const c=$('progressDots');c.innerHTML='';
  for(let i=0;i<sequence.length;i++){const d=document.createElement('div');d.className='pdot'+(i===0?' current':'');d.id='pdot'+i;c.appendChild(d);}
}
function markDot(index,cls){const d=$('pdot'+index);if(d)d.className='pdot '+cls;}
function updateStats(){$('statLevel').textContent=level;$('statBest').textContent=stats.best;$('statRounds').textContent=stats.rounds;}
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}
$('statBest').textContent=stats.best;
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&state==='idle')startGame();});
</script>
</body>
</html>
