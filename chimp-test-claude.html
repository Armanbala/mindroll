<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#040a04">
<title>Chimp Test — MindRoll</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040a04;--bg-r:#081408;
  --fg:#b8ffb8;--fg-b:#d8ffd8;--fg-d:#7fbf7f;--fg-f:#3a7a3a;
  --fg-bg:#1e3d1e;--fg-bg2:#2f5f2f;
  --accent:#6fe06f;--red:#ff6a5a;
  --glow:0 0 4px rgba(111,224,111,0.35);
  --font:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
html,body{background:var(--bg);color:var(--fg);font-family:var(--font);font-size:14px;line-height:1.55;min-height:100dvh;-webkit-tap-highlight-color:transparent}
body{position:relative;padding:0 20px calc(80px + env(safe-area-inset-bottom,0px));text-shadow:var(--glow);display:flex;flex-direction:column;align-items:center}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0 1px,transparent 1px 3px);mix-blend-mode:multiply}

.topbar{width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;gap:16px;font-size:11px;letter-spacing:0.08em;color:var(--fg-d);padding:14px 0 10px;border-bottom:1px solid var(--fg-bg);margin-bottom:16px;position:relative;z-index:2}
.topbar .tb-brand{color:var(--accent);font-weight:700;letter-spacing:0.15em}
.topbar a{color:var(--fg-d);text-decoration:none}
.topbar a:hover{color:var(--fg-b)}

.page-head{width:100%;max-width:900px;border-top:1px solid var(--fg-bg);border-bottom:1px solid var(--fg-bg);padding:8px 0;margin-bottom:20px;position:relative;z-index:2}
.page-head h1{font-size:13px;font-weight:700;color:var(--fg-b);letter-spacing:0.12em;text-transform:uppercase}
.page-head h1::before{content:"» ";color:var(--accent)}

.wrap{width:100%;max-width:900px;position:relative;z-index:2}

/* Strikes */
.strikes-bar{display:flex;gap:10px;justify-content:center;margin-bottom:14px;font-size:18px}
.strike{transition:opacity 0.3s}
.strike.used{opacity:0.12}

.display-box{background:var(--bg-r);border:1px solid var(--fg-bg);min-height:440px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;margin-bottom:20px;position:relative;overflow:hidden}
.display-box::before,.display-box::after{content:"";position:absolute;width:14px;height:14px;border:1px solid var(--accent);opacity:0.8}
.display-box::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.display-box::after{bottom:-1px;right:-1px;border-left:none;border-top:none}

/* Chimp grid — percentage-based for mobile */
.chimp-grid{position:relative;width:100%;max-width:520px;height:340px}
@media(max-width:560px){.chimp-grid{height:280px}}

.chimp-cell{
  position:absolute;
  display:flex;align-items:center;justify-content:center;
  background:var(--accent);color:var(--bg);
  font-family:var(--font);font-size:20px;font-weight:700;
  cursor:pointer;user-select:none;
  transition:transform 0.1s,opacity 0.12s;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.chimp-cell:hover{transform:scale(1.06)}
.chimp-cell:active{transform:scale(0.91)}
.chimp-cell.hidden-num{background:var(--bg-r);border:1px solid var(--fg-bg);color:transparent}
.chimp-cell.correct-pop{background:var(--accent);opacity:0;transform:scale(0.8);pointer-events:none;transition:opacity 0.2s,transform 0.2s}
.chimp-cell.wrong-pop{background:var(--red);color:#fff;animation:shake 0.4s ease}

.level-display{font-size:clamp(32px,6vw,48px);font-weight:700;color:var(--accent);text-shadow:0 0 12px rgba(111,224,111,0.5)}
.state-message{font-size:16px;color:var(--fg-d);text-align:center;margin-top:8px}
.sub-message{font-size:13px;color:var(--fg-f);text-align:center;margin-top:6px;max-width:460px;line-height:1.5}

.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
button{font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:transparent;color:var(--fg-b);border:1px solid var(--fg-d);padding:9px 20px;cursor:pointer;border-radius:0;text-shadow:var(--glow);transition:background 0.08s,border-color 0.08s,color 0.08s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button:hover{background:rgba(111,224,111,0.1);border-color:var(--accent);color:var(--accent)}
button:active{background:rgba(111,224,111,0.2)}
button.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);text-shadow:none}
button.primary:hover{background:#8fff8f;color:var(--bg)}
button.secondary{border-color:var(--fg-bg);color:var(--fg-d)}

.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.stat-card{flex:1 1 90px;background:var(--bg-r);border:1px solid var(--fg-bg);padding:10px 14px;min-width:80px}
.stat-label{font-size:10px;color:var(--fg-f);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:4px}
.stat-label::before{content:"› ";color:var(--fg-bg2)}
.stat-value{font-size:22px;font-weight:700;color:var(--fg-b)}

.toast{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:var(--bg);font-weight:700;letter-spacing:0.08em;padding:10px 22px;border:1px solid var(--accent);opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;z-index:100;text-shadow:none;font-family:var(--font);font-size:13px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
</style>
</head>
<body>

<div class="topbar">
  <span class="tb-brand">MINDROLL_BBS</span>
  <a href="index.html">← BACK TO LAB</a>
</div>

<div class="page-head"><h1>Chimp Test</h1></div>

<div class="wrap">

  <div class="strikes-bar" id="strikesBar" style="display:none"></div>

  <div class="display-box" id="displayBox">
    <div class="level-display" id="levelDisplay" style="display:none"></div>
    <span class="state-message" id="stateMsg">Are you smarter than a chimpanzee?</span>
    <span class="sub-message" id="subMsg">Numbers appear on screen. Click them in order from 1. After your first click, the rest hide.</span>
    <div class="chimp-grid" id="chimpGrid" style="display:none"></div>
  </div>

  <div class="btn-row">
    <button class="primary" id="startBtn" onclick="startGame()">Start</button>
    <button class="secondary" id="retryBtn" onclick="startGame()" style="display:none">Try again</button>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-card"><div class="stat-label">Numbers</div><div class="stat-value" id="statNumbers">4</div></div>
    <div class="stat-card"><div class="stat-label">Best</div><div class="stat-value" id="statBest">0</div></div>
    <div class="stat-card"><div class="stat-label">Rounds</div><div class="stat-value" id="statRounds">0</div></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
let numbers=[],nextExpected=1,numCount=4,strikes=0,maxStrikes=3,state='idle',numbersHidden=false;
let stats={best:parseInt(localStorage.getItem('mindroll_chimp_best')||'0',10),rounds:0};
function $(id){return document.getElementById(id)}

function startGame(){
  numCount=4;strikes=0;stats.rounds=0;state='playing';
  $('startBtn').style.display='none';$('retryBtn').style.display='none';
  $('statsBar').style.display='flex';$('stateMsg').style.display='none';
  $('subMsg').style.display='none';$('levelDisplay').style.display='none';
  renderStrikes();updateStats();startRound();
}

function startRound(){
  numbersHidden=false;nextExpected=1;numbers=[];
  const grid=$('chimpGrid');grid.style.display='block';grid.innerHTML='';

  const gridW=Math.min(520,window.innerWidth-60);
  const gridH=window.innerWidth<=560?280:340;
  const cellSize=Math.max(40,Math.min(56,Math.floor(gridW/(numCount<=6?4:5))-8));
  const cols=Math.floor((gridW+8)/(cellSize+8));
  const rows=Math.floor((gridH+8)/(cellSize+8));
  const usedSlots=new Set();

  for(let i=1;i<=numCount;i++){
    let attempts=0,col,row,key;
    do{col=Math.floor(Math.random()*cols);row=Math.floor(Math.random()*rows);key=col+','+row;attempts++;}
    while(usedSlots.has(key)&&attempts<200);
    usedSlots.add(key);
    const x=col*(cellSize+8),y=row*(cellSize+8);
    const cell=document.createElement('div');
    cell.className='chimp-cell';
    cell.style.left=x+'px';cell.style.top=y+'px';
    cell.style.width=cellSize+'px';cell.style.height=cellSize+'px';
    cell.style.fontSize=Math.max(14,cellSize*0.38)+'px';
    cell.textContent=i;cell.dataset.num=i;
    cell.addEventListener('click',()=>cellClicked(cell,i));
    cell.addEventListener('touchend',e=>{e.preventDefault();cellClicked(cell,i);});
    grid.appendChild(cell);
  }
}

function cellClicked(cell,num){
  if(state!=='playing')return;
  if(!numbersHidden&&num===1){
    numbersHidden=true;
    const cells=$('chimpGrid').children;
    for(let c of cells){if(parseInt(c.dataset.num)!==1)c.classList.add('hidden-num');}
  }
  if(num===nextExpected){
    cell.classList.add('correct-pop');nextExpected++;
    if(nextExpected>numCount){
      stats.rounds++;numCount++;
      if(numCount-1>stats.best){stats.best=numCount-1;localStorage.setItem('mindroll_chimp_best',stats.best.toString());}
      updateStats();showToast(numCount<=7?'Nice!':numCount<=10?'Impressive!':'Superhuman!');
      setTimeout(()=>startRound(),500);
    }
  } else {
    cell.classList.add('wrong-pop');strikes++;stats.rounds++;renderStrikes();
    if(strikes>=maxStrikes){
      state='gameover';
      const cells=$('chimpGrid').children;
      for(let c of cells){c.classList.remove('hidden-num');c.style.pointerEvents='none';}
      if(numCount>stats.best){stats.best=numCount;localStorage.setItem('mindroll_chimp_best',stats.best.toString());}
      updateStats();
      setTimeout(()=>{
        $('chimpGrid').style.display='none';
        $('levelDisplay').style.display='block';$('levelDisplay').textContent=numCount;
        $('stateMsg').style.display='block';$('stateMsg').textContent='Game over';
        $('subMsg').style.display='block';$('subMsg').textContent='You reached '+numCount+' numbers';
        $('retryBtn').style.display='inline-block';
      },1000);
    } else {
      showToast('Strike '+strikes+'/'+maxStrikes);
      const cells=$('chimpGrid').children;
      for(let c of cells){c.classList.remove('hidden-num');c.style.pointerEvents='none';}
      setTimeout(()=>startRound(),1000);
    }
  }
}

function renderStrikes(){
  const bar=$('strikesBar');bar.style.display='flex';bar.innerHTML='';
  for(let i=0;i<maxStrikes;i++){const s=document.createElement('span');s.className='strike'+(i<strikes?' used':'');s.textContent='✖';bar.appendChild(s);}
}
function updateStats(){$('statNumbers').textContent=numCount;$('statBest').textContent=stats.best;$('statRounds').textContent=stats.rounds;}
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}
$('statBest').textContent=stats.best;
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&state==='idle')startGame();});
</script>
</body>
</html>
