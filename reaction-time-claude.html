<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#040a04">
<title>Reaction Time — MindRoll</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040a04;--bg-r:#081408;
  --fg:#b8ffb8;--fg-b:#d8ffd8;--fg-d:#7fbf7f;--fg-f:#3a7a3a;
  --fg-bg:#1e3d1e;--fg-bg2:#2f5f2f;
  --accent:#6fe06f;--red:#ff6a5a;
  --glow:0 0 4px rgba(111,224,111,0.35);
  --font:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
html,body{background:var(--bg);color:var(--fg);font-family:var(--font);font-size:14px;line-height:1.55;min-height:100dvh;-webkit-tap-highlight-color:transparent}
body{position:relative;padding:0 20px calc(80px + env(safe-area-inset-bottom,0px));text-shadow:var(--glow);display:flex;flex-direction:column;align-items:center}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0 1px,transparent 1px 3px);mix-blend-mode:multiply}

.topbar{width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;gap:16px;font-size:11px;letter-spacing:0.08em;color:var(--fg-d);padding:14px 0 10px;border-bottom:1px solid var(--fg-bg);margin-bottom:16px;position:relative;z-index:2}
.topbar .tb-brand{color:var(--accent);font-weight:700;letter-spacing:0.15em}
.topbar a{color:var(--fg-d);text-decoration:none}
.topbar a:hover{color:var(--fg-b)}

.page-head{width:100%;max-width:900px;border-top:1px solid var(--fg-bg);border-bottom:1px solid var(--fg-bg);padding:8px 0;margin-bottom:20px;position:relative;z-index:2}
.page-head h1{font-size:13px;font-weight:700;color:var(--fg-b);letter-spacing:0.12em;text-transform:uppercase}
.page-head h1::before{content:"» ";color:var(--accent)}

.wrap{width:100%;max-width:900px;position:relative;z-index:2}

/* Reaction zone */
.reaction-zone{
  width:100%;min-height:360px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 2rem;margin-bottom:20px;cursor:pointer;user-select:none;
  transition:background 0.12s,border-color 0.12s;overflow:hidden;
  position:relative;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.reaction-zone::before,.reaction-zone::after{content:"";position:absolute;width:14px;height:14px;border:1px solid currentColor;opacity:0.5}
.reaction-zone::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.reaction-zone::after{bottom:-1px;right:-1px;border-left:none;border-top:none}

.reaction-zone.idle  {background:var(--bg-r);border:1px solid var(--fg-bg);color:var(--fg-bg2)}
.reaction-zone.waiting{background:#3a1010;border:1px solid var(--red);color:var(--red)}
.reaction-zone.ready {background:#0a2a0a;border:1px solid var(--accent);color:var(--accent)}
.reaction-zone.result{background:var(--bg-r);border:1px solid var(--fg-bg);color:var(--fg-bg2)}
.reaction-zone.too-early{background:#2a0808;border:1px solid var(--red);color:var(--red)}

.zone-icon{font-size:52px;margin-bottom:14px;line-height:1}
.zone-title{font-size:clamp(36px,8vw,52px);font-weight:700;margin-bottom:8px;text-align:center;color:inherit;text-shadow:none}
.zone-message{font-size:18px;font-weight:700;text-align:center;color:inherit;letter-spacing:0.06em;text-shadow:none}
.zone-sub{font-size:12px;text-align:center;color:inherit;opacity:0.7;margin-top:6px;letter-spacing:0.08em;text-shadow:none}

/* Results */
.results-list{width:100%;display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.result-row{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--bg-r);border:1px solid var(--fg-bg);gap:8px}
.result-index{font-size:11px;color:var(--fg-f);letter-spacing:0.15em;text-transform:uppercase;width:60px}
.result-time{font-size:18px;font-weight:700}
.result-time.fast{color:var(--accent)}
.result-time.medium{color:#ffd25a}
.result-time.slow{color:var(--red)}
.result-bar-wrap{flex:1;margin:0 12px;height:4px;background:var(--fg-bg);overflow:hidden}
.result-bar{height:100%;transition:width 0.5s ease}

.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.stat-card{flex:1 1 90px;background:var(--bg-r);border:1px solid var(--fg-bg);padding:10px 14px;min-width:80px}
.stat-label{font-size:10px;color:var(--fg-f);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:4px}
.stat-label::before{content:"› ";color:var(--fg-bg2)}
.stat-value{font-size:22px;font-weight:700;color:var(--fg-b)}

.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
button{font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:transparent;color:var(--fg-b);border:1px solid var(--fg-d);padding:9px 20px;cursor:pointer;border-radius:0;text-shadow:var(--glow);transition:background 0.08s,border-color 0.08s,color 0.08s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button:hover{background:rgba(111,224,111,0.1);border-color:var(--accent);color:var(--accent)}
button:active{background:rgba(111,224,111,0.2)}
button.secondary{border-color:var(--fg-bg);color:var(--fg-d)}

@media(max-width:480px){.reaction-zone{min-height:280px;padding:2rem 1rem}.zone-title{font-size:36px}}
</style>
</head>
<body>

<div class="topbar">
  <span class="tb-brand">MINDROLL_BBS</span>
  <a href="index.html">← BACK TO LAB</a>
</div>

<div class="page-head"><h1>Reaction Time</h1></div>

<div class="wrap">

  <div class="reaction-zone idle" id="zone" onclick="zoneClicked()">
    <div class="zone-icon" id="zoneIcon">⚡</div>
    <div class="zone-title" id="zoneTitle"></div>
    <div class="zone-message" id="zoneMsg">Tap anywhere to start</div>
    <div class="zone-sub" id="zoneSub">5 rounds — wait for green, then click as fast as you can</div>
  </div>

  <div class="results-list" id="resultsList" style="display:none"></div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-card"><div class="stat-label">Average</div><div class="stat-value" id="statAvg">-</div></div>
    <div class="stat-card"><div class="stat-label">Best</div><div class="stat-value" id="statBestRound">-</div></div>
    <div class="stat-card"><div class="stat-label">All-time</div><div class="stat-value" id="statAllTime">-</div></div>
  </div>

  <div class="btn-row" id="btnRow" style="display:none">
    <button class="secondary" onclick="resetGame()">Play again</button>
  </div>

</div>

<script>
let state='idle',greenTimeout=null,greenTime=0,round=0,maxRounds=5,times=[];
let allTimeBest=parseInt(localStorage.getItem('mindroll_react_best')||'0',10);
function $(id){return document.getElementById(id)}

function zoneClicked(){
  if(state==='idle')startWaiting();
  else if(state==='waiting'){clearTimeout(greenTimeout);state='too-early';setZone('too-early','','Too early!','Tap to try again','');}
  else if(state==='too-early')startWaiting();
  else if(state==='ready'){
    const ms=Math.round(performance.now()-greenTime);
    times.push(ms);round++;state='result';
    const label=ms<200?'Incredible!':ms<280?'Fast!':ms<400?'Good':'Keep going';
    setZone('result',ms+'ms',label,'Round '+round+' of '+maxRounds,'');
    if(round>=maxRounds)showFinalResults();
    else setTimeout(()=>{if(state==='result')startWaiting();},1200);
  }
  else if(state==='done')resetGame();
}

function startWaiting(){
  state='waiting';setZone('waiting','','Wait for green…','','');
  const delay=1500+Math.random()*4000;
  greenTimeout=setTimeout(()=>{state='ready';greenTime=performance.now();setZone('ready','','Click now!','','');},delay);
}

function setZone(cls,title,msg,sub,icon){
  const zone=$('zone');zone.className='reaction-zone '+cls;
  $('zoneTitle').textContent=title;$('zoneMsg').textContent=msg;$('zoneSub').textContent=sub;
  const ic=$('zoneIcon');if(icon){ic.innerHTML=icon;ic.style.display='block';}else ic.style.display='none';
}

function showFinalResults(){
  state='done';
  const avg=Math.round(times.reduce((a,b)=>a+b,0)/times.length);
  const best=Math.min(...times);
  if(!allTimeBest||best<allTimeBest){allTimeBest=best;localStorage.setItem('mindroll_react_best',allTimeBest.toString());}
  const ratingMsg=avg<200?'Lightning!':avg<250?'Excellent!':avg<300?'Great reflexes':avg<400?'Above avg':'Keep practicing';
  setZone('result',avg+'ms',ratingMsg,'Avg of '+maxRounds+' rounds · tap to play again','');
  const list=$('resultsList');list.style.display='flex';
  const maxTime=Math.max(...times,500);
  list.innerHTML=times.map((t,i)=>{
    const pct=Math.min(100,(t/maxTime)*100);
    const cls=t<220?'fast':t<350?'medium':'slow';
    const color=t<220?'var(--accent)':t<350?'#ffd25a':'var(--red)';
    return `<div class="result-row"><span class="result-index">Round ${i+1}</span><div class="result-bar-wrap"><div class="result-bar" style="width:${pct}%;background:${color}"></div></div><span class="result-time ${cls}">${t}ms</span></div>`;
  }).join('');
  $('statsBar').style.display='flex';
  $('statAvg').textContent=avg+'ms';$('statBestRound').textContent=best+'ms';$('statAllTime').textContent=allTimeBest+'ms';
  $('btnRow').style.display='flex';
}

function resetGame(){
  state='idle';round=0;times=[];
  $('resultsList').style.display='none';$('statsBar').style.display='none';$('btnRow').style.display='none';
  setZone('idle','','Tap anywhere to start','5 rounds — wait for green, then click as fast as you can','⚡');
  $('zoneIcon').style.display='block';
}

if(allTimeBest)$('statAllTime').textContent=allTimeBest+'ms';

// support touch on the zone
$('zone').addEventListener('touchend',e=>{e.preventDefault();zoneClicked();});
</script>
</body>
</html>
