<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#040a04">
<title>Digit Memorization — MindRoll</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040a04;--bg-r:#081408;
  --fg:#b8ffb8;--fg-b:#d8ffd8;--fg-d:#7fbf7f;--fg-f:#3a7a3a;
  --fg-bg:#1e3d1e;--fg-bg2:#2f5f2f;
  --accent:#6fe06f;--red:#ff6a5a;--red-bg:rgba(255,106,90,0.12);
  --glow:0 0 4px rgba(111,224,111,0.35);
  --font:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
html,body{background:var(--bg);color:var(--fg);font-family:var(--font);font-size:14px;line-height:1.55;min-height:100dvh;-webkit-tap-highlight-color:transparent}
body{position:relative;padding:0 20px calc(80px + env(safe-area-inset-bottom,0px));text-shadow:var(--glow);display:flex;flex-direction:column;align-items:center}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0 1px,transparent 1px 3px);mix-blend-mode:multiply}

.topbar{width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;gap:16px;font-size:11px;letter-spacing:0.08em;color:var(--fg-d);padding:14px 0 10px;border-bottom:1px solid var(--fg-bg);margin-bottom:16px;position:relative;z-index:2;flex-wrap:wrap}
.topbar .tb-brand{color:var(--accent);font-weight:700;letter-spacing:0.15em}
.topbar a{color:var(--fg-d);text-decoration:none}
.topbar a:hover{color:var(--fg-b)}
.topbar .tb-back{color:var(--fg-d);font-size:11px;letter-spacing:0.1em}

.page-head{width:100%;max-width:900px;border-top:1px solid var(--fg-bg);border-bottom:1px solid var(--fg-bg);padding:8px 0;margin-bottom:20px;position:relative;z-index:2}
.page-head h1{font-size:13px;font-weight:700;color:var(--fg-b);letter-spacing:0.12em;text-transform:uppercase}
.page-head h1::before{content:"» ";color:var(--accent)}

.wrap{width:100%;max-width:900px;position:relative;z-index:2}

/* Settings */
.settings{display:flex;flex-wrap:wrap;gap:12px 20px;align-items:center;padding:12px 14px;border:1px dashed var(--fg-bg);margin-bottom:20px;background:rgba(0,0,0,0.2)}
.setting-group{display:flex;align-items:center;gap:10px}
.setting-group label{font-size:11px;color:var(--fg-d);letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap}
select,input[type="number"]{font-family:var(--font);font-size:14px;background:var(--bg-r);color:var(--fg-b);border:1px solid var(--fg-bg);padding:7px 10px;outline:none;caret-color:var(--accent);transition:border-color 0.1s;-webkit-appearance:none;appearance:none;border-radius:0}
select:focus,input[type="number"]:focus{border-color:var(--accent)}
input[type="number"]{width:70px;text-align:center;font-size:16px}
select{padding-right:26px;background-image:linear-gradient(45deg,transparent 50%,var(--fg-d) 50%),linear-gradient(-45deg,transparent 50%,var(--fg-d) 50%);background-position:calc(100% - 12px) 50%,calc(100% - 7px) 50%;background-size:4px 4px;background-repeat:no-repeat}

/* Display box */
.display-box{background:var(--bg-r);border:1px solid var(--fg-bg);min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.5rem;margin-bottom:20px;position:relative;overflow:hidden}
.display-box::before,.display-box::after{content:"";position:absolute;width:14px;height:14px;border:1px solid var(--accent);opacity:0.8}
.display-box::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.display-box::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
.digit-display{font-size:clamp(36px,8vw,64px);font-weight:700;color:var(--accent);letter-spacing:10px;text-shadow:0 0 12px rgba(111,224,111,0.6);word-break:break-all;text-align:center;line-height:1.3}
.timer-bar{position:absolute;bottom:0;left:0;height:3px;background:var(--accent);transition:width 0.1s linear}
.countdown-label{font-size:12px;color:var(--fg-f);margin-top:10px;letter-spacing:0.1em}
.state-message{font-size:16px;color:var(--fg-d);text-align:center}

/* Answer input */
.answer-area{width:100%;display:none;flex-direction:column;align-items:center;gap:14px;margin-bottom:18px}
.answer-input{font-family:var(--font);font-size:clamp(20px,5vw,28px);font-weight:700;letter-spacing:8px;text-align:center;width:100%;padding:12px;border:none;border-bottom:1px dashed var(--fg-bg);background:transparent;color:var(--fg-b);outline:none;caret-color:var(--accent);text-shadow:var(--glow)}
.answer-input:focus{border-bottom-color:var(--accent)}
.answer-input::placeholder{color:var(--fg-f);font-size:16px;letter-spacing:4px}

/* Feedback */
.feedback{display:none;flex-direction:column;align-items:center;gap:12px;width:100%;margin-bottom:18px}
.feedback-badge{font-size:13px;font-weight:700;padding:6px 20px;letter-spacing:0.08em;text-transform:uppercase}
.feedback-badge.correct{border:1px solid var(--accent);color:var(--accent)}
.feedback-badge.incorrect{border:1px solid var(--red);color:var(--red)}
.feedback-compare{font-size:13px;color:var(--fg-d);text-align:center;line-height:1.8}
.correct-char{color:var(--accent)}
.incorrect-char{color:var(--red);text-decoration:underline}

/* Buttons */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
button{font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:transparent;color:var(--fg-b);border:1px solid var(--fg-d);padding:9px 20px;cursor:pointer;border-radius:0;text-shadow:var(--glow);transition:background 0.08s,border-color 0.08s,color 0.08s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button:hover{background:rgba(111,224,111,0.1);border-color:var(--accent);color:var(--accent)}
button:active{background:rgba(111,224,111,0.2)}
button.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);text-shadow:none}
button.primary:hover{background:#8fff8f;color:var(--bg)}
button.secondary{border-color:var(--fg-bg);color:var(--fg-d)}
button:disabled{opacity:0.4;cursor:not-allowed}

/* Stats */
.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.stat-card{flex:1 1 100px;background:var(--bg-r);border:1px solid var(--fg-bg);padding:10px 14px;min-width:90px}
.stat-label{font-size:10px;color:var(--fg-f);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:4px}
.stat-label::before{content:"› ";color:var(--fg-bg2)}
.stat-value{font-size:22px;font-weight:700;color:var(--fg-b);letter-spacing:0.05em}

/* History */
.history-section{border-top:1px solid var(--fg-bg);padding-top:14px;margin-top:14px;display:none}
.history-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.history-head span{font-size:11px;color:var(--fg-d);letter-spacing:0.15em;text-transform:uppercase}
.history-clear{font-family:var(--font);font-size:11px;padding:4px 10px;background:transparent;color:var(--fg-f);border:1px solid var(--fg-bg);cursor:pointer;letter-spacing:0.08em;touch-action:manipulation}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--fg-bg);font-size:13px;color:var(--fg-d);gap:10px;flex-wrap:wrap}
.history-item:last-child{border-bottom:none}
.history-digits{font-weight:700;letter-spacing:2px;color:var(--fg-b)}
.history-result{font-size:11px;font-weight:700;padding:2px 8px;letter-spacing:0.08em}
.history-result.correct{border:1px solid var(--accent);color:var(--accent)}
.history-result.incorrect{border:1px solid var(--red);color:var(--red)}

/* Toast */
.toast{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:var(--bg);font-weight:700;letter-spacing:0.08em;padding:10px 22px;border:1px solid var(--accent);opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;z-index:100;text-shadow:none;font-family:var(--font);font-size:13px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}

@media(max-width:480px){
  .digit-display{letter-spacing:6px}
  .answer-input{letter-spacing:6px}
  .stats-bar .stat-card{min-width:80px}
}
</style>
</head>
<body>

<div class="topbar">
  <span class="tb-brand">MINDROLL_BBS</span>
  <a href="index.html" class="tb-back">← BACK TO LAB</a>
</div>

<div class="page-head">
  <h1>Digit Memorization</h1>
</div>

<div class="wrap">

  <div class="settings" id="settings">
    <div class="setting-group">
      <label>Digits</label>
      <input type="number" id="digitCount" value="7" min="1" max="50" inputmode="numeric">
    </div>
    <div class="setting-group">
      <label>Timer</label>
      <select id="timerMode">
        <option value="infinite">Infinite</option>
        <option value="3">3 s</option>
        <option value="5" selected>5 s</option>
        <option value="7">7 s</option>
        <option value="10">10 s</option>
        <option value="15">15 s</option>
        <option value="20">20 s</option>
        <option value="30">30 s</option>
        <option value="60">60 s</option>
      </select>
    </div>
  </div>

  <div class="display-box" id="displayBox">
    <span class="state-message" id="stateMsg">Press start to begin</span>
    <span class="digit-display" id="digitDisplay" style="display:none;"></span>
    <div class="timer-bar" id="timerBar" style="width:0%;"></div>
    <span class="countdown-label" id="countdownLabel" style="display:none;"></span>
  </div>

  <div class="answer-area" id="answerArea">
    <input type="text" class="answer-input" id="answerInput" placeholder="type digits…" autocomplete="off" inputmode="numeric" autocorrect="off" autocapitalize="off">
  </div>

  <div class="feedback" id="feedback">
    <span class="feedback-badge" id="feedbackBadge"></span>
    <div class="feedback-compare" id="feedbackCompare"></div>
  </div>

  <div class="btn-row" id="btnRow">
    <button class="primary" id="startBtn" onclick="startRound()">Start</button>
    <button class="primary" id="submitBtn" onclick="submitAnswer()" style="display:none;">Check</button>
    <button class="secondary" id="nextBtn" onclick="nextRound()" style="display:none;">Next round</button>
    <button class="secondary" id="readyBtn" onclick="hideDigits()" style="display:none;">I'm ready</button>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none;">
    <div class="stat-card"><div class="stat-label">Streak</div><div class="stat-value" id="statStreak">0</div></div>
    <div class="stat-card"><div class="stat-label">Best</div><div class="stat-value" id="statBest">0</div></div>
    <div class="stat-card"><div class="stat-label">Correct</div><div class="stat-value" id="statCorrect">0</div></div>
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="statTotal">0</div></div>
  </div>

  <div class="history-section" id="historySection">
    <div class="history-head">
      <span>History</span>
      <button class="history-clear" onclick="clearHistory()">Clear</button>
    </div>
    <div id="historyList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let currentDigits='',timerInterval=null,state='idle';
let stats={streak:0,best:0,correct:0,total:0},historyData=[];
function $(id){return document.getElementById(id)}

function generateDigits(n){let d='';for(let i=0;i<n;i++)d+=Math.floor(Math.random()*10);return d}

function startRound(){
  const count=Math.max(1,Math.min(50,parseInt($('digitCount').value,10)||7));
  currentDigits=generateDigits(count);
  const tv=$('timerMode').value;
  $('stateMsg').style.display='none';
  $('digitDisplay').style.display='block';
  $('digitDisplay').textContent=currentDigits;
  $('digitDisplay').style.fontSize=count>20?'24px':count>12?'34px':count>8?'44px':'clamp(36px,8vw,64px)';
  $('digitDisplay').style.animation='none';$('digitDisplay').offsetHeight;$('digitDisplay').style.animation='fadeIn 0.2s ease';
  $('feedback').style.display='none';$('answerArea').style.display='none';$('answerInput').value='';
  $('startBtn').style.display='none';$('submitBtn').style.display='none';$('nextBtn').style.display='none';
  if(tv==='infinite'){
    $('readyBtn').style.display='inline-block';
    $('countdownLabel').style.display='block';$('countdownLabel').textContent='take your time';
    $('timerBar').style.width='100%';state='showing';
  } else {
    $('readyBtn').style.display='inline-block';
    startTimer(parseInt(tv,10));state='showing';
  }
  $('statsBar').style.display='flex';
}

function startTimer(seconds){
  clearInterval(timerInterval);
  let remaining=seconds;
  $('timerBar').style.width='100%';
  $('countdownLabel').style.display='block';$('countdownLabel').textContent=remaining+'s';
  timerInterval=setInterval(()=>{
    remaining-=0.1;
    if(remaining<=0){clearInterval(timerInterval);timerInterval=null;$('timerBar').style.width='0%';$('countdownLabel').textContent='0s';hideDigits();return;}
    $('timerBar').style.width=(remaining/seconds*100)+'%';
    $('countdownLabel').textContent=Math.ceil(remaining)+'s';
  },100);
}

function hideDigits(){
  clearInterval(timerInterval);timerInterval=null;state='answering';
  $('digitDisplay').style.display='none';$('stateMsg').style.display='block';$('stateMsg').textContent='What were the digits?';
  $('timerBar').style.width='0%';$('countdownLabel').style.display='none';
  $('readyBtn').style.display='none';$('answerArea').style.display='flex';$('submitBtn').style.display='inline-block';
  setTimeout(()=>$('answerInput').focus(),50);
}

function submitAnswer(){
  if(state!=='answering')return;
  state='result';
  const answer=$('answerInput').value.trim();
  const isCorrect=answer===currentDigits;
  stats.total++;
  if(isCorrect){stats.correct++;stats.streak++;if(stats.streak>stats.best)stats.best=stats.streak;}
  else stats.streak=0;
  updateStats();
  $('answerArea').style.display='none';$('submitBtn').style.display='none';
  $('feedback').style.display='flex';
  const badge=$('feedbackBadge');
  badge.textContent=isCorrect?'Correct!':'Incorrect';
  badge.className='feedback-badge '+(isCorrect?'correct':'incorrect');
  let html='<div style="margin-bottom:4px">Your answer: ';
  for(let i=0;i<Math.max(answer.length,currentDigits.length);i++){
    const y=answer[i]||'';const a=currentDigits[i]||'';
    html+=y===a?'<span class="correct-char">'+esc(y)+'</span>':'<span class="incorrect-char">'+(y||'_')+'</span>';
  }
  html+='</div><div>Correct: <span style="color:var(--accent);letter-spacing:4px">'+esc(currentDigits)+'</span></div>';
  $('feedbackCompare').innerHTML=html;
  $('stateMsg').style.display='none';$('digitDisplay').style.display='block';$('digitDisplay').textContent=currentDigits;
  $('nextBtn').style.display='inline-block';
  addHistory(currentDigits,answer,isCorrect);
}

function nextRound(){$('feedback').style.display='none';$('nextBtn').style.display='none';startRound()}
function updateStats(){$('statStreak').textContent=stats.streak;$('statBest').textContent=stats.best;$('statCorrect').textContent=stats.correct;$('statTotal').textContent=stats.total}
function addHistory(digits,answer,correct){
  historyData.unshift({digits,answer,correct,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  if(historyData.length>30)historyData.pop();renderHistory();
}
function renderHistory(){
  const sec=$('historySection'),list=$('historyList');
  if(historyData.length===0){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=historyData.map(h=>`
    <div class="history-item">
      <span class="history-digits">${esc(h.digits)}</span>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--fg-f)">${esc(h.answer)}</span>
        <span class="history-result ${h.correct?'correct':'incorrect'}">${h.correct?'OK':'WRONG'}</span>
        <span style="font-size:11px;color:var(--fg-f)">${h.time}</span>
      </div>
    </div>`).join('');
}
function clearHistory(){historyData.length=0;renderHistory()}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
$('answerInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&state==='answering')submitAnswer()});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&state==='idle')startRound();
  if(e.key==='Enter'&&state==='result')nextRound();
});
</script>
</body>
</html>
