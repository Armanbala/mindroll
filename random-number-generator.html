<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#040a04">
<title>Number Generator — MindRoll</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040a04;--bg-r:#081408;
  --fg:#b8ffb8;--fg-b:#d8ffd8;--fg-d:#7fbf7f;--fg-f:#3a7a3a;
  --fg-bg:#1e3d1e;--fg-bg2:#2f5f2f;
  --accent:#6fe06f;--red:#ff6a5a;
  --glow:0 0 4px rgba(111,224,111,0.35);
  --font:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
html,body{background:var(--bg);color:var(--fg);font-family:var(--font);font-size:14px;line-height:1.55;min-height:100dvh;-webkit-tap-highlight-color:transparent}
body{position:relative;padding:0 20px calc(80px + env(safe-area-inset-bottom,0px));text-shadow:var(--glow);display:flex;flex-direction:column;align-items:center}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0 1px,transparent 1px 3px);mix-blend-mode:multiply}

.topbar{width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;gap:16px;font-size:11px;letter-spacing:0.08em;color:var(--fg-d);padding:14px 0 10px;border-bottom:1px solid var(--fg-bg);margin-bottom:16px;position:relative;z-index:2}
.topbar .tb-brand{color:var(--accent);font-weight:700;letter-spacing:0.15em}
.topbar a{color:var(--fg-d);text-decoration:none}
.topbar a:hover{color:var(--fg-b)}

.page-head{width:100%;max-width:900px;border-top:1px solid var(--fg-bg);border-bottom:1px solid var(--fg-bg);padding:8px 0;margin-bottom:20px;position:relative;z-index:2}
.page-head h1{font-size:13px;font-weight:700;color:var(--fg-b);letter-spacing:0.12em;text-transform:uppercase}
.page-head h1::before{content:"» ";color:var(--accent)}

.wrap{width:100%;max-width:900px;position:relative;z-index:2}

/* Result box */
.result-box{position:relative;background:var(--bg-r);border:1px solid var(--fg-bg);min-height:150px;display:flex;align-items:center;justify-content:center;padding:2rem 5rem 1.5rem 2rem;margin-bottom:16px;overflow:hidden}
.result-box::before,.result-box::after{content:"";position:absolute;width:14px;height:14px;border:1px solid var(--accent);opacity:0.8}
.result-box::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.result-box::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
.result-display{font-size:clamp(32px,7vw,60px);font-weight:700;letter-spacing:8px;color:var(--accent);text-align:center;word-break:break-all;line-height:1.2;text-shadow:0 0 12px rgba(111,224,111,0.5)}
.roll-btn{position:absolute;top:14px;right:14px;width:56px;height:56px;background:var(--accent);color:var(--bg);border:none;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.08em;text-shadow:none;transition:transform 0.1s,opacity 0.12s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.roll-btn:hover{opacity:0.85}
.roll-btn:active{transform:scale(0.91)}

/* Action bar */
.action-bar{display:flex;justify-content:flex-end;gap:16px;margin-bottom:16px}
.action-btn{background:none;border:none;font-family:var(--font);font-size:12px;color:var(--fg-d);cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 0;transition:color 0.12s;letter-spacing:0.08em;text-shadow:var(--glow);touch-action:manipulation}
.action-btn:hover{color:var(--fg-b)}
.action-btn svg{width:14px;height:14px}

/* Math bar */
.math-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.math-label{font-size:11px;color:var(--fg-f);letter-spacing:0.15em;text-transform:uppercase;margin-right:4px}
.math-btn{font-family:var(--font);font-size:16px;font-weight:700;width:44px;height:38px;border:1px solid var(--fg-bg);background:transparent;color:var(--fg-d);cursor:pointer;transition:all 0.12s;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.math-btn:hover{border-color:var(--fg-d);color:var(--fg-b)}
.math-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);text-shadow:none}

/* Settings */
.settings{display:flex;flex-wrap:wrap;gap:12px 16px;align-items:center;padding:12px 14px;border:1px dashed var(--fg-bg);margin-bottom:16px;background:rgba(0,0,0,0.2)}
.setting-group{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.setting-group label{font-size:11px;color:var(--fg-d);letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap}
select,input[type="number"]{font-family:var(--font);font-size:14px;background:var(--bg-r);color:var(--fg-b);border:1px solid var(--fg-bg);padding:7px 10px;outline:none;caret-color:var(--accent);transition:border-color 0.1s;-webkit-appearance:none;appearance:none;border-radius:0}
select:focus,input[type="number"]:focus{border-color:var(--accent)}
input[type="number"]{width:74px;text-align:center;font-size:16px;inputmode:numeric}
select{padding-right:26px;background-image:linear-gradient(45deg,transparent 50%,var(--fg-d) 50%),linear-gradient(-45deg,transparent 50%,var(--fg-d) 50%);background-position:calc(100% - 12px) 50%,calc(100% - 7px) 50%;background-size:4px 4px;background-repeat:no-repeat}

/* Generate button */
.generate-wrap{text-align:center;margin:16px 0}
.generate-btn{font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:10px 36px;background:var(--accent);color:var(--bg);border:none;cursor:pointer;text-shadow:none;transition:background 0.1s,transform 0.08s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.generate-btn:hover{background:#8fff8f}
.generate-btn:active{transform:scale(0.97)}

/* Section label */
.section-label{font-size:11px;color:var(--fg-f);letter-spacing:0.18em;text-transform:uppercase;margin:16px 0 10px;display:flex;align-items:center;gap:10px}
.section-label::before{content:"──";color:var(--fg-bg2)}
.section-label::after{content:"";flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--fg-bg) 0 4px,transparent 4px 8px)}

/* Shortcut buttons */
.shortcut-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.sc-btn{font-family:var(--font);font-size:12px;font-weight:500;padding:7px 16px;background:transparent;color:var(--fg-d);border:1px solid var(--fg-bg);cursor:pointer;letter-spacing:0.08em;transition:all 0.1s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.sc-btn:hover{background:rgba(111,224,111,0.08);border-color:var(--fg-d);color:var(--fg-b)}
.sc-btn:active{background:rgba(111,224,111,0.15)}

/* History */
.history-section{border-top:1px solid var(--fg-bg);padding-top:14px;margin-top:16px;display:none}
.history-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.history-head span{font-size:11px;color:var(--fg-d);letter-spacing:0.15em;text-transform:uppercase}
.history-clear{font-family:var(--font);font-size:11px;padding:4px 10px;background:transparent;color:var(--fg-f);border:1px solid var(--fg-bg);cursor:pointer;letter-spacing:0.08em;touch-action:manipulation}
.history-item{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px dashed var(--fg-bg);gap:10px;flex-wrap:wrap}
.history-item:last-child{border-bottom:none}
.history-values{font-weight:700;color:var(--fg-b);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;font-size:14px}
.history-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.history-time{font-size:11px;color:var(--fg-f)}
.history-reroll{width:30px;height:30px;background:transparent;border:1px solid var(--fg-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s;touch-action:manipulation;flex-shrink:0}
.history-reroll:hover{background:rgba(111,224,111,0.08)}
.history-reroll svg{width:13px;height:13px;color:var(--fg-d)}
.math-row{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.math-eq-label{font-size:12px;color:var(--fg-f);letter-spacing:0.5px}
.reveal-btn{font-family:var(--font);font-size:11px;font-weight:700;padding:2px 10px;border:1px solid var(--fg-bg);background:transparent;color:var(--fg-d);cursor:pointer;transition:all 0.1s;touch-action:manipulation}
.reveal-btn:hover{background:rgba(111,224,111,0.08)}
.reveal-btn.revealed{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.reveal-answer{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:0.5px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;align-items:center;justify-content:center}
.modal-box{background:var(--bg-r);border:1px solid var(--fg-bg);padding:1.5rem;width:90%;max-width:400px}
.modal-box p{font-size:13px;color:var(--fg-d);letter-spacing:0.08em;margin-bottom:10px;text-transform:uppercase}
textarea{width:100%;font-family:var(--font);font-size:14px;padding:10px;border:1px solid var(--fg-bg);resize:vertical;background:var(--bg);color:var(--fg-b);outline:none;caret-color:var(--accent);min-height:140px}
textarea:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:12px;justify-content:flex-end}

/* Toast */
.toast{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:var(--bg);font-weight:700;letter-spacing:0.08em;padding:10px 22px;border:1px solid var(--accent);opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;z-index:100;text-shadow:none;font-family:var(--font);font-size:13px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
@media(max-width:480px){.result-box{padding:1.5rem 4.5rem 1.5rem 1.5rem;min-height:120px}.result-display{font-size:32px;letter-spacing:4px}}
</style>
</head>
<body>

<div class="topbar">
  <span class="tb-brand">MINDROLL_BBS</span>
  <a href="index.html">← BACK TO LAB</a>
</div>

<div class="page-head"><h1>Random Number Generator</h1></div>

<div class="wrap">

  <div class="result-box" id="resultBox">
    <div style="text-align:center;width:100%">
      <span class="result-display" id="resultDisplay">—</span>
    </div>
    <button class="roll-btn" onclick="generate()">ROLL</button>
  </div>

  <div class="action-bar">
    <button class="action-btn" onclick="copyResult()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copy
    </button>
    <button class="action-btn" onclick="downloadResult()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </button>
  </div>

  <div class="math-bar">
    <span class="math-label">Math</span>
    <button class="math-btn" id="mathAdd" onclick="toggleMath('add')" title="+">+</button>
    <button class="math-btn" id="mathSub" onclick="toggleMath('sub')" title="−">−</button>
    <button class="math-btn" id="mathMul" onclick="toggleMath('mul')" title="×">×</button>
    <button class="math-btn" id="mathDiv" onclick="toggleMath('div')" title="÷">÷</button>
  </div>

  <div class="settings">
    <div class="setting-group">
      <label>Count</label>
      <input type="number" id="inpCount" value="2" min="1" max="10000" inputmode="numeric">
    </div>
    <div class="setting-group">
      <label>Between</label>
      <input type="number" id="inpMin" value="1" inputmode="numeric">
      <span style="color:var(--fg-f)">–</span>
      <input type="number" id="inpMax" value="100" inputmode="numeric">
    </div>
    <div class="setting-group">
      <label>Unique</label>
      <select id="selUnique"><option value="any">Any</option><option value="unique" selected>Unique</option></select>
    </div>
    <div class="setting-group">
      <label>Parity</label>
      <select id="selParity"><option value="both">Both</option><option value="odd">Odd</option><option value="even">Even</option></select>
    </div>
    <div class="setting-group">
      <label>Sort</label>
      <select id="selSort"><option value="unsorted">None</option><option value="asc">Asc</option><option value="desc">Desc</option></select>
    </div>
    <div class="setting-group">
      <label>Sep</label>
      <select id="selSep"><option value="space">Space</option><option value="comma">Comma</option><option value="newline">Line</option></select>
    </div>
    <div class="setting-group">
      <label>Mode</label>
      <select id="selMode"><option value="number" selected>Numbers</option><option value="alpha">Alpha A–Z</option><option value="hex">Hex</option><option value="binary">Binary</option></select>
    </div>
  </div>

  <div class="generate-wrap">
    <button class="generate-btn" onclick="generate()">Generate</button>
  </div>

  <div class="section-label">shortcuts</div>

  <div class="shortcut-group">
    <button class="sc-btn" onclick="shortcut(1,10)">1–10</button>
    <button class="sc-btn" onclick="shortcut(1,100)">1–100</button>
    <button class="sc-btn" onclick="shortcut(1,1000)">1–1000</button>
  </div>
  <div class="shortcut-group">
    <button class="sc-btn" onclick="pickFromList()">Pick from list</button>
    <button class="sc-btn" onclick="multipleLines()">Multiple lines</button>
  </div>
  <div class="shortcut-group">
    <button class="sc-btn" onclick="digitShortcut(3)">3-digit</button>
    <button class="sc-btn" onclick="digitShortcut(4)">4-digit</button>
    <button class="sc-btn" onclick="digitShortcut(6)">6-digit</button>
    <button class="sc-btn" onclick="digitShortcut(8)">8-digit</button>
  </div>
  <div class="shortcut-group">
    <button class="sc-btn" onclick="modeShortcut('alpha')">Alpha</button>
    <button class="sc-btn" onclick="modeShortcut('hex')">Hex</button>
    <button class="sc-btn" onclick="modeShortcut('binary')">Binary</button>
  </div>

  <div class="history-section" id="historySection">
    <div class="history-head">
      <span>History</span>
      <button class="history-clear" onclick="clearHistory()">Clear</button>
    </div>
    <div id="historyList"></div>
  </div>

</div>

<!-- List modal -->
<div class="modal-overlay" id="listModal">
  <div class="modal-box">
    <p>Enter items (one per line)</p>
    <textarea id="listInput" rows="7"></textarea>
    <div class="modal-btns">
      <button class="sc-btn" onclick="closeListModal()">Cancel</button>
      <button class="generate-btn" onclick="pickFromListGo()">Pick</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const historyData=[];let lastResult='',lastNumbers=[],activeMath=null;
const mathOps={add:{sym:'+',fn:(a,b)=>a+b},sub:{sym:'−',fn:(a,b)=>a-b},mul:{sym:'×',fn:(a,b)=>a*b},div:{sym:'÷',fn:(a,b)=>a/b}};
function $(id){return document.getElementById(id)}
function val(id){return $(id).value}
function num(id){return parseInt($(id).value,10)||0}

function toggleMath(op){
  if(activeMath===op){activeMath=null;document.querySelectorAll('.math-btn').forEach(b=>b.classList.remove('active'));}
  else{activeMath=op;document.querySelectorAll('.math-btn').forEach(b=>b.classList.remove('active'));$('math'+op[0].toUpperCase()+op.slice(1)).classList.add('active');}
}

function computeMath(numbers,op){
  if(!op||!numbers||numbers.length<2)return null;
  const{sym,fn}=mathOps[op];let result=numbers[0];
  for(let i=1;i<numbers.length;i++)result=fn(result,numbers[i]);
  const eq=numbers.join(' '+sym+' ');
  const isInt=Number.isInteger(result);
  const display=isInt?result.toString():result.toFixed(4).replace(/\.?0+$/,'');
  return{equation:eq,answer:display};
}

function generate(overrideConfig){
  const cfg=overrideConfig||getCurrentConfig();
  const mode=cfg.mode;let count=Math.max(1,Math.min(10000,cfg.count));
  let min=cfg.min,max=cfg.max;if(min>max)[min,max]=[max,min];
  const{unique,parity,sort,sep}=cfg;
  let pool=[];
  if(mode==='number'){for(let i=min;i<=max;i++){if(parity==='odd'&&i%2===0)continue;if(parity==='even'&&i%2!==0)continue;pool.push(i);}}
  else if(mode==='alpha'){for(let i=0;i<26;i++)pool.push(String.fromCharCode(65+i));}
  else{for(let i=min;i<=max;i++)pool.push(i);}
  if(pool.length===0){$('resultDisplay').textContent='No valid numbers';return;}
  const actualCount=unique?Math.min(count,pool.length):count;
  let results=[];
  if(unique){let sh=[...pool];for(let i=sh.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sh[i],sh[j]]=[sh[j],sh[i]];}results=sh.slice(0,actualCount);}
  else{for(let i=0;i<actualCount;i++)results.push(pool[Math.floor(Math.random()*pool.length)]);}
  if(mode==='number'){if(sort==='asc')results.sort((a,b)=>a-b);if(sort==='desc')results.sort((a,b)=>b-a);}
  lastNumbers=(mode==='number'||mode==='hex'||mode==='binary')?[...results]:[];
  let display;
  if(mode==='hex')display=results.map(n=>n.toString(16).toUpperCase());
  else if(mode==='binary')display=results.map(n=>n.toString(2));
  else display=results.map(String);
  const seps={space:' ',comma:', ',newline:'\n'};
  const sepChar=seps[sep]||' ';const text=display.join(sepChar);
  const el=$('resultDisplay');
  if(sep==='newline'){el.style.whiteSpace='pre-line';el.style.fontSize=actualCount>10?'22px':actualCount>4?'30px':'40px';}
  else{el.style.whiteSpace='normal';el.style.fontSize=text.length>40?'22px':text.length>20?'32px':text.length>10?'40px':'clamp(32px,7vw,60px)';}
  el.textContent=text;lastResult=text;
  el.style.animation='none';el.offsetHeight;el.style.animation='fadeIn 0.2s ease';
  const mathInfo=activeMath&&lastNumbers.length>=2?computeMath(lastNumbers,activeMath):null;
  addHistory(text,cfg,mathInfo);
}

function getCurrentConfig(){return{mode:val('selMode'),count:num('inpCount'),min:num('inpMin'),max:num('inpMax'),unique:val('selUnique')==='unique',parity:val('selParity'),sort:val('selSort'),sep:val('selSep')};}

function addHistory(text,cfg,mathInfo){
  historyData.unshift({text,cfg:{...cfg},math:mathInfo||null,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  if(historyData.length>20)historyData.pop();renderHistory();
}

function renderHistory(){
  const sec=$('historySection'),list=$('historyList');
  if(historyData.length===0){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=historyData.map((h,i)=>{
    let mathLine='';
    if(h.math){mathLine=`<div class="math-row"><span class="math-eq-label">${esc(h.math.equation)} =</span><button class="reveal-btn" id="rb${i}" onclick="revealAnswer(${i})">show</button><span class="reveal-answer" id="ra${i}" style="display:none">${esc(h.math.answer)}</span></div>`;}
    return`<div class="history-item"><div style="flex:1;min-width:0"><span class="history-values">${esc(h.text)}</span>${mathLine}</div><div class="history-meta"><span class="history-time">${h.time}</span><button class="history-reroll" title="Re-roll" onclick="reroll(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-11.36L3 10"/></svg></button></div></div>`;
  }).join('');
}

function revealAnswer(idx){const btn=$('rb'+idx),ans=$('ra'+idx);if(ans.style.display==='none'){ans.style.display='inline';btn.textContent='hide';btn.classList.add('revealed');}else{ans.style.display='none';btn.textContent='show';btn.classList.remove('revealed');}}
function reroll(idx){const e=historyData[idx];if(!e)return;generate(e.cfg);window.scrollTo({top:0,behavior:'smooth'});}
function clearHistory(){historyData.length=0;renderHistory();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function shortcut(min,max){$('inpMin').value=min;$('inpMax').value=max;$('selMode').value='number';generate();}
function digitShortcut(d){const min=d===1?0:Math.pow(10,d-1);const max=Math.pow(10,d)-1;$('inpMin').value=min;$('inpMax').value=max;$('inpCount').value=1;$('selMode').value='number';generate();}
function modeShortcut(m){$('selMode').value=m;generate();}
function pickFromList(){$('listModal').style.display='flex';}
function closeListModal(){$('listModal').style.display='none';}
function pickFromListGo(){
  const items=$('listInput').value.split('\n').map(s=>s.trim()).filter(Boolean);if(items.length===0)return;
  const pick=items[Math.floor(Math.random()*items.length)];
  const el=$('resultDisplay');el.style.whiteSpace='normal';el.style.fontSize=pick.length>30?'22px':pick.length>15?'32px':'40px';
  el.textContent=pick;lastResult=pick;lastNumbers=[];
  addHistory(pick,{mode:'list',count:1,min:0,max:items.length-1,unique:false,parity:'both',sort:'unsorted',sep:'space'},null);
  closeListModal();
}
function multipleLines(){$('selSep').value='newline';$('inpCount').value=10;generate();}
function copyResult(){
  if(!lastResult)return;let t=lastResult;
  if(activeMath&&lastNumbers.length>=2){const c=computeMath(lastNumbers,activeMath);if(c)t+='\n'+c.equation+' = '+c.answer;}
  navigator.clipboard.writeText(t).then(()=>showToast('Copied!')).catch(()=>showToast('Copy failed'));
}
function downloadResult(){
  if(!lastResult)return;let t=lastResult;
  if(activeMath&&lastNumbers.length>=2){const c=computeMath(lastNumbers,activeMath);if(c)t+='\n'+c.equation+' = '+c.answer;}
  const blob=new Blob([t],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='random-numbers.txt';a.click();URL.revokeObjectURL(a.href);showToast('Downloaded!');
}
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&$('listModal').style.display!=='flex')generate();});
</script>
